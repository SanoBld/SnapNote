name: Build SnapNote EXE
on:
  push:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restaurer les paquets
      run: dotnet restore SnapNote.csproj

    - name: Compilation Unique EXE
      run: dotnet publish SnapNote.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true /p:Configuration=Release /p:Platform=x64

    - name: Créer le lien de téléchargement
      uses: actions/upload-artifact@v4
      with:
        name: SnapNote-Application
        path: bin/x64/Release/net8.0-windows10.0.19041.0/win-x64/publish/
